<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generic Shaka Cast Receiver</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #status { display: none; }

    #controls {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 12;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto;
      grid-template-rows: auto auto;
      gap: 10px 12px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.48));
      font: 16px/1.2 system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s ease, transform .25s ease;
      pointer-events: auto;
    }

    body.controls-visible #controls,
    #controls:focus-within,
    #controls:hover {
      opacity: 1;
      transform: translateY(0);
    }

    #title {
      grid-column: 1 / -1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      opacity: .95;
      font-weight: 600;
    }

    #playPause {
      width: 46px;
      height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.12);
      color: #fff;
      font-size: 17px;
    }

    #seek { width: 100%; accent-color: #fff; }
    #time { min-width: 128px; text-align: right; opacity: .9; font-variant-numeric: tabular-nums; }
    #audioSelect, #subsSelect {
      max-width: 230px;
      color: #fff;
      background: rgba(20,20,20,.92);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 9px;
      padding: 8px 10px;
      font: inherit;
    }

    #debugOverlay {
      display: none;
      position: absolute;
      left: 16px;
      top: 16px;
      width: calc(100% - 32px);
      height: calc(100% - 32px);
      overflow: auto;
      box-sizing: border-box;
      padding: 56px 16px 16px;
      background: rgba(0, 0, 0, 0.86);
      color: #d7ffd7;
      font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      z-index: 20;
      scroll-behavior: auto;
    }

    #debugControls {
      display: none;
      position: absolute;
      left: 16px;
      top: 16px;
      right: 16px;
      height: 48px;
      box-sizing: border-box;
      padding: 8px 12px;
      background: rgba(20, 20, 20, 0.94);
      color: #fff;
      font: 13px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px 10px 0 0;
      z-index: 25;
      gap: 8px;
      align-items: center;
    }

    .debug-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 7px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 6px 10px;
      font: inherit;
    }

    #debugPageLabel {
      opacity: 0.95;
      min-width: 180px;
    }

    #debugHint {
      opacity: 0.75;
      margin-left: auto;
      font-size: 12px;
    }


    #qrPanel {
      display: none;
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 360px;
      max-width: calc(100% - 48px);
      box-sizing: border-box;
      padding: 12px;
      background: rgba(0,0,0,0.94);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 12px;
      color: #fff;
      z-index: 40;
      font: 12px/1.25 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      box-shadow: 0 8px 36px rgba(0,0,0,0.55);
    }

    #qrPanel.visible {
      display: block;
    }

    #qrImage {
      width: 320px;
      height: 320px;
      max-width: 100%;
      display: block;
      margin: 8px auto;
      background: #fff;
      image-rendering: pixelated;
    }

    #qrText {
      word-break: break-all;
      max-height: 120px;
      overflow: auto;
      opacity: 0.9;
    }

    #qrTitle {
      font-weight: 700;
      margin-bottom: 4px;
    }

    #qrHint {
      opacity: 0.75;
      margin-top: 6px;
    }

    body.debug #debugOverlay {
      display: block;
    }

    body.debug #debugControls {
      display: flex;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="status" aria-hidden="true">Ready</div>
  <div id="controls">
    <div id="title">Ready</div>
    <button id="playPause" type="button">▶</button>
    <input id="seek" type="range" min="0" max="0" step="0.1" value="0">
    <div id="time">00:00 / 00:00</div>
    <select id="audioSelect" title="Audio"></select>
    <select id="subsSelect" title="Subtitles"></select>
  </div>
  <div id="debugControls">
    <button id="debugPrev" class="debug-button">◀ Prev</button>
    <button id="debugNext" class="debug-button">Next ▶</button>
    <button id="debugAuto" class="debug-button">Auto</button>
    <button id="debugQr" class="debug-button">QR Log</button>
    <span id="debugPageLabel">Page 1/1</span>
    <span id="debugHint">Use ←/→, ↑/↓, PageUp/PageDown or OK/Enter</span>
  </div>
  <pre id="debugOverlay">Debug overlay ready</pre>
  <div id="qrPanel">
    <div id="qrTitle">Debug log QR</div>
    <img id="qrImage" alt="Debug QR" referrerpolicy="no-referrer">
    <div id="qrText"></div>
    <div id="qrHint">Escanea el QR. Si es demasiado largo, copia el texto corto mostrado o usa páginas Prev/Next para revisar el log.</div>
  </div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
