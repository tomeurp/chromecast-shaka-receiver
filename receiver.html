<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generic Shaka Cast Receiver</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #status {
      position: absolute;
      left: 24px;
      bottom: 24px;
      color: #fff;
      font-size: 18px;
      opacity: 0.85;
      text-shadow: 0 1px 4px #000;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="status">Ready</div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
