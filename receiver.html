<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ETB Shaka Cast Receiver</title>
  <style>
    :root {
      --accent: #5ecbff;
      --accent-soft: rgba(94, 203, 255, .35);
      --glass: rgba(22, 25, 34, .46);
      --glass-strong: rgba(16, 18, 25, .84);
      --line: rgba(255,255,255,.22);
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.66);
      --shadow: rgba(0,0,0,.52);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    #video {
      position: fixed;
      inset: 0;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    #shade {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 38vh;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease;
      background: linear-gradient(to top, rgba(0,0,0,.72), rgba(0,0,0,.34) 48%, rgba(0,0,0,0));
    }
    body.ui-visible #shade,
    body.paused #shade,
    body.menu-open #shade { opacity: 1; }

    #ui {
      position: fixed;
      left: 50%;
      bottom: 52px;
      transform: translate(-50%, 18px);
      z-index: 10;
      width: min(1480px, calc(100vw - 128px));
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    body.ui-visible #ui,
    body.paused #ui,
    body.menu-open #ui {
      opacity: 1;
      transform: translate(-50%, 0);
      pointer-events: auto;
    }

    #title {
      max-width: 55vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 24px;
      font-weight: 780;
      letter-spacing: -.02em;
      text-shadow: 0 2px 14px rgba(0,0,0,.72);
    }
    #timelineRow {
      display: grid;
      grid-template-columns: 74px minmax(180px,1fr) 88px;
      gap: 20px;
      align-items: center;
    }
    .time {
      color: var(--muted);
      font: 720 17px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 12px rgba(0,0,0,.8);
    }
    #durationText { text-align: right; }
    #scrubber {
      position: relative;
      height: 36px;
      outline: none;
      border-radius: 999px;
      display: flex;
      align-items: center;
    }
    #scrubber::before {
      content: "";
      position: absolute;
      inset: 8px 0;
      border-radius: 999px;
      background: rgba(255,255,255,.23);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.5);
    }
    #bufferBar, #progressBar {
      position: absolute;
      left: 0;
      top: 8px;
      height: 20px;
      width: 0%;
      border-radius: 999px;
      pointer-events: none;
    }
    #bufferBar { background: rgba(255,255,255,.38); }
    #progressBar { background: linear-gradient(90deg, rgba(94,203,255,.95), rgba(255,255,255,.82)); }
    #thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.55);
      transform: translate(-50%, -50%) scale(.72);
      opacity: 0;
      transition: opacity .12s ease, transform .12s ease;
    }
    #scrubber.focused #thumb,
    #scrubber:focus #thumb {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    #scrubber.focused::before,
    #scrubber:focus::before {
      box-shadow: 0 0 0 5px var(--accent-soft), inset 0 1px 2px rgba(0,0,0,.5);
    }

    #buttonRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .tv-btn {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.20);
      background: var(--glass);
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      outline: none;
      padding: 0;
      box-shadow: 0 12px 32px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.12);
      -webkit-backdrop-filter: blur(14px) saturate(1.2);
      backdrop-filter: blur(14px) saturate(1.2);
      transform: scale(1);
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .tv-btn svg { width: 30px; height: 30px; display: block; fill: currentColor; }
    .tv-btn.focused,
    .tv-btn:focus {
      transform: scale(1.12);
      background: rgba(255,255,255,.18);
      border-color: #fff;
      box-shadow: 0 0 0 6px var(--accent-soft), 0 18px 44px rgba(0,0,0,.44), inset 0 1px 0 rgba(255,255,255,.20);
    }
    .tv-btn.disabled { opacity: .42; }

    .menu {
      position: fixed;
      z-index: 20;
      left: 50%;
      bottom: 146px;
      transform: translateX(-50%);
      min-width: 340px;
      max-width: min(620px, calc(100vw - 160px));
      max-height: min(55vh, 540px);
      overflow: hidden auto;
      display: none;
      padding: 14px;
      border-radius: 26px;
      border: 1px solid var(--line);
      background: var(--glass-strong);
      box-shadow: 0 22px 80px rgba(0,0,0,.64), inset 0 1px 0 rgba(255,255,255,.10);
      -webkit-backdrop-filter: blur(22px) saturate(1.2);
      backdrop-filter: blur(22px) saturate(1.2);
    }
    .menu.open { display: block; }
    .menu-title {
      padding: 8px 14px 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .menu-item {
      width: 100%;
      min-height: 54px;
      border: 3px solid transparent;
      border-radius: 18px;
      background: transparent;
      color: #fff;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 14px;
      font: 740 18px/1.15 system-ui, sans-serif;
      text-align: left;
    }
    .menu-item .check { opacity: 0; color: var(--accent); font-weight: 1000; }
    .menu-item.active .check { opacity: 1; }
    .menu-item.focused,
    .menu-item:focus {
      background: rgba(255,255,255,.14);
      border-color: #fff;
      box-shadow: 0 0 0 5px var(--accent-soft);
    }

    #debug {
      display: none;
      position: fixed;
      inset: 18px;
      z-index: 90;
      overflow: auto;
      padding: 18px;
      background: rgba(0,0,0,.88);
      color: #d8ffd8;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 14px;
      font: 13px/1.38 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
    }
    body.debug #debug { display: block; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="shade" aria-hidden="true"></div>

  <section id="ui" aria-label="Controles de reproducción">
    <div id="title">ETB</div>
    <div id="timelineRow">
      <div id="currentText" class="time">0:00</div>
      <div id="scrubber" class="focusable" tabindex="0" role="slider" aria-label="Posición" aria-valuemin="0" aria-valuemax="0" aria-valuenow="0">
        <div id="bufferBar"></div>
        <div id="progressBar"></div>
        <div id="thumb"></div>
      </div>
      <div id="durationText" class="time">0:00</div>
    </div>
    <div id="buttonRow">
      <button id="restartBtn" class="tv-btn focusable" tabindex="-1" aria-label="Reiniciar"></button>
      <button id="rewBtn" class="tv-btn focusable" tabindex="-1" aria-label="Retroceder 10 segundos"></button>
      <button id="playBtn" class="tv-btn focusable" tabindex="-1" aria-label="Reproducir o pausar"></button>
      <button id="fwdBtn" class="tv-btn focusable" tabindex="-1" aria-label="Avanzar 10 segundos"></button>
      <button id="audioBtn" class="tv-btn focusable" tabindex="-1" aria-label="Audio"></button>
      <button id="subsBtn" class="tv-btn focusable" tabindex="-1" aria-label="Subtítulos"></button>
      <button id="qualityBtn" class="tv-btn focusable" tabindex="-1" aria-label="Calidad"></button>
    </div>
  </section>

  <div id="audioMenu" class="menu" role="menu"></div>
  <div id="subsMenu" class="menu" role="menu"></div>
  <div id="qualityMenu" class="menu" role="menu"></div>
  <pre id="debug"></pre>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
