<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generic Shaka Cast Receiver</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    video {
      width: 100%;
      height: 100%;
      background: #000;
    }

    #status {
      position: absolute;
      left: 24px;
      bottom: 24px;
      color: #fff;
      font-size: 18px;
      opacity: 0.85;
      text-shadow: 0 1px 4px #000;
      z-index: 10;
    }

    #debugOverlay {
      display: none;
      position: absolute;
      left: 16px;
      top: 16px;
      width: calc(100% - 32px);
      max-height: calc(100% - 32px);
      overflow: auto;
      box-sizing: border-box;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.82);
      color: #d7ffd7;
      font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      z-index: 20;
    }

    body.debug #debugOverlay {
      display: block;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="status">Ready</div>
  <pre id="debugOverlay">Debug overlay ready</pre>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
