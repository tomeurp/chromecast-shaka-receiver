<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>ETB CAF Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    cast-media-player {
      --theme-hue: 210;
      --progress-color: #ffffff;
      --splash-image: none;
      --splash-size: cover;
      --logo-image: none;
      --watermark-image: none;
      width: 100%;
      height: 100%;
      background: #000;
    }

    #trackMenu {
      position: absolute;
      left: 50%;
      bottom: 8.2vh;
      transform: translateX(-50%) translateY(14px);
      z-index: 40;
      min-width: 460px;
      max-width: 86vw;
      box-sizing: border-box;
      padding: 14px 16px 16px;
      border-radius: 22px;
      background: rgba(10, 10, 14, 0.82);
      color: white;
      box-shadow: 0 14px 50px rgba(0,0,0,.52);
      border: 1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }

    #trackMenu.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .track-title {
      font-size: 15px;
      line-height: 1;
      opacity: .72;
      margin-bottom: 12px;
      letter-spacing: .02em;
      text-align: center;
    }

    .track-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .track-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 650;
      border: 2px solid transparent;
      background: rgba(255,255,255,.12);
      color: rgba(255,255,255,.88);
      box-sizing: border-box;
    }

    .track-chip.active {
      background: rgba(255,255,255,.92);
      color: #070707;
    }

    .track-chip.focused {
      border-color: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.22);
      transform: scale(1.035);
    }

    #debugOverlay {
      display: none;
      position: absolute;
      inset: 16px;
      z-index: 9999;
      padding: 16px;
      box-sizing: border-box;
      overflow: auto;
      background: rgba(0,0,0,.88);
      color: #d9ffd9;
      font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 12px;
    }

    body.debug #debugOverlay { display: block; }
  </style>
</head>
<body>
  <cast-media-player></cast-media-player>

  <div id="trackMenu" aria-hidden="true">
    <div class="track-title" id="trackMenuTitle">Subtitles</div>
    <div class="track-row" id="trackMenuRow"></div>
  </div>

  <pre id="debugOverlay"></pre>
  <script src="receiver.js"></script>
</body>
</html>
