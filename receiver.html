<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generic Shaka Cast Receiver</title>
  <style>
    :root {
      --etb-blue: #4aa3ff;
      --glass: rgba(12, 14, 20, .72);
      --glass-strong: rgba(10, 12, 18, .9);
      --line: rgba(255,255,255,.18);
      --text: rgba(255,255,255,.96);
      --muted: rgba(255,255,255,.72);
      --focus: rgba(74,163,255,.95);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, system-ui, sans-serif;
      color: var(--text);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .24s ease;
      background:
        linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.42) 30%, transparent 58%),
        linear-gradient(to bottom, rgba(0,0,0,.45) 0%, transparent 34%);
      z-index: 5;
    }

    body.controls-visible::after,
    body.menu-open::after { opacity: 1; }

    video {
      width: 100%;
      height: 100%;
      background: #000;
      display: block;
    }

    #status { display: none !important; }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 34px;
      transform: translate(-50%, 18px) scale(.985);
      width: min(1540px, calc(100% - 76px));
      box-sizing: border-box;
      z-index: 12;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      display: grid;
      grid-template-columns: auto auto 1fr auto auto auto;
      grid-template-areas:
        "title title title title title title"
        "play back seek time audio subs";
      gap: 12px;
      align-items: center;
      padding: 18px 20px 20px;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(24,27,36,.78), rgba(8,10,16,.74));
      box-shadow: 0 22px 74px rgba(0,0,0,.56), inset 0 1px 0 rgba(255,255,255,.12);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
    }

    body.controls-visible #controls,
    body.menu-open #controls,
    #controls:focus-within {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
      pointer-events: auto;
    }

    #title {
      grid-area: title;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.01em;
      color: var(--text);
      text-shadow: 0 1px 8px rgba(0,0,0,.45);
    }

    .receiver-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      min-width: 54px;
      height: 48px;
      padding: 0 18px;
      color: #fff;
      background: rgba(255,255,255,.10);
      font: 700 16px/1 system-ui, sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
      outline: none;
    }

    .receiver-btn.icon { width: 54px; padding: 0; font-size: 20px; }
    .receiver-btn.wide { min-width: 108px; justify-content: flex-start; }

    .receiver-btn:focus,
    .receiver-btn.focused,
    #seek:focus {
      border-color: rgba(255,255,255,.95);
      box-shadow: 0 0 0 4px rgba(74,163,255,.34), 0 0 28px rgba(74,163,255,.36), inset 0 1px 0 rgba(255,255,255,.18);
      background: rgba(255,255,255,.18);
    }

    .receiver-btn:active { transform: scale(.97); }

    #playPause { grid-area: play; }
    #skipBack { grid-area: back; }
    #audioButton { grid-area: audio; }
    #subsButton { grid-area: subs; }

    #seekWrap {
      grid-area: seek;
      min-width: 0;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 4px;
    }

    #seek {
      width: 100%;
      accent-color: var(--etb-blue);
      outline: none;
      cursor: pointer;
    }

    #time {
      grid-area: time;
      min-width: 152px;
      text-align: right;
      color: var(--muted);
      font: 600 16px/1.1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    .track-menu {
      position: absolute;
      right: 20px;
      bottom: 90px;
      display: none;
      min-width: 300px;
      max-width: min(520px, calc(100vw - 96px));
      max-height: min(60vh, 520px);
      overflow: auto;
      padding: 10px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.16);
      background: var(--glass-strong);
      backdrop-filter: blur(18px) saturate(1.2);
      -webkit-backdrop-filter: blur(18px) saturate(1.2);
      box-shadow: 0 20px 70px rgba(0,0,0,.58);
      z-index: 16;
    }

    .track-menu.open { display: block; }
    #audioMenu { right: 156px; }

    .track-menu-title {
      padding: 8px 12px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .track-menu-item {
      appearance: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      margin: 2px 0;
      color: #fff;
      background: transparent;
      font: 600 17px/1.15 system-ui, sans-serif;
      text-align: left;
      outline: none;
    }

    .track-menu-item .check { opacity: 0; color: var(--etb-blue); font-weight: 900; }
    .track-menu-item.active .check { opacity: 1; }
    .track-menu-item:focus,
    .track-menu-item.focused,
    .track-menu-item:hover {
      background: rgba(255,255,255,.16);
      box-shadow: 0 0 0 3px rgba(74,163,255,.26);
    }

    #debugOverlay {
      display: none;
      position: absolute;
      left: 16px;
      top: 16px;
      width: calc(100% - 32px);
      height: calc(100% - 32px);
      overflow: auto;
      box-sizing: border-box;
      padding: 56px 16px 16px;
      background: rgba(0, 0, 0, 0.86);
      color: #d7ffd7;
      font: 13px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      z-index: 20;
      scroll-behavior: auto;
    }

    #debugControls {
      display: none;
      position: absolute;
      left: 16px;
      top: 16px;
      right: 16px;
      height: 48px;
      box-sizing: border-box;
      padding: 8px 12px;
      background: rgba(20, 20, 20, 0.94);
      color: #fff;
      font: 13px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px 10px 0 0;
      z-index: 25;
      gap: 8px;
      align-items: center;
    }

    .debug-button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 7px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      padding: 6px 10px;
      font: inherit;
    }

    #debugPageLabel { opacity: 0.95; min-width: 180px; }
    #debugHint { opacity: 0.75; margin-left: auto; font-size: 12px; }

    #qrPanel {
      display: none;
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 360px;
      max-width: calc(100% - 48px);
      box-sizing: border-box;
      padding: 12px;
      background: rgba(0,0,0,0.94);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 12px;
      color: #fff;
      z-index: 40;
      font: 12px/1.25 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      box-shadow: 0 8px 36px rgba(0,0,0,0.55);
    }

    #qrPanel.visible { display: block; }
    #qrImage { width: 320px; height: 320px; max-width: 100%; display: block; margin: 8px auto; background: #fff; image-rendering: pixelated; }
    #qrText { word-break: break-all; max-height: 120px; overflow: auto; opacity: 0.9; }
    #qrTitle { font-weight: 700; margin-bottom: 4px; }
    #qrHint { opacity: 0.75; margin-top: 6px; }
    body.debug #debugOverlay { display: block; }
    body.debug #debugControls { display: flex; }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline></video>
  <div id="status" aria-hidden="true">Ready</div>
  <div id="controls" role="group" aria-label="Playback controls">
    <div id="title">Ready</div>
    <button id="playPause" class="receiver-btn icon focusable" type="button" aria-label="Play or pause">▶</button>
    <button id="skipBack" class="receiver-btn icon focusable" type="button" aria-label="Back 10 seconds">↺</button>
    <div id="seekWrap">
      <input id="seek" class="focusable" type="range" min="0" max="0" step="0.1" value="0" aria-label="Playback position">
    </div>
    <div id="time">00:00 / 00:00</div>
    <button id="audioButton" class="receiver-btn wide focusable" type="button" aria-label="Audio track">Audio</button>
    <button id="subsButton" class="receiver-btn wide focusable" type="button" aria-label="Subtitles">Subs</button>
    <div id="audioMenu" class="track-menu" role="menu" aria-label="Audio tracks"></div>
    <div id="subsMenu" class="track-menu" role="menu" aria-label="Subtitle tracks"></div>
  </div>
  <div id="debugControls">
    <button id="debugPrev" class="debug-button">◀ Prev</button>
    <button id="debugNext" class="debug-button">Next ▶</button>
    <button id="debugAuto" class="debug-button">Auto</button>
    <button id="debugQr" class="debug-button">QR Log</button>
    <span id="debugPageLabel">Page 1/1</span>
    <span id="debugHint">Use ←/→, ↑/↓, PageUp/PageDown or OK/Enter</span>
  </div>
  <pre id="debugOverlay">Debug overlay ready</pre>
  <div id="qrPanel">
    <div id="qrTitle">Debug log QR</div>
    <img id="qrImage" alt="Debug QR" referrerpolicy="no-referrer">
    <div id="qrText"></div>
    <div id="qrHint">Escanea el QR. Si es demasiado largo, copia el texto corto mostrado o usa páginas Prev/Next para revisar el log.</div>
  </div>

  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.js"></script>
  <script src="receiver.js"></script>
</body>
</html>
